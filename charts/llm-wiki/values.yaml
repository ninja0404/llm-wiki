replicaCount:
  platformApi: 1
  worker: 1
  mcp: 1
  converter: 1
  web: 1

image:
  platformApi:
    repository: llm-wiki/platform-api
    tag: latest
    pullPolicy: IfNotPresent
  worker:
    repository: llm-wiki/compiler-worker
    tag: latest
    pullPolicy: IfNotPresent
  mcp:
    repository: llm-wiki/mcp-service
    tag: latest
    pullPolicy: IfNotPresent
  converter:
    repository: llm-wiki/converter-service
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: llm-wiki/web
    tag: latest
    pullPolicy: IfNotPresent

service:
  platformApi:
    type: ClusterIP
    port: 8000
  mcp:
    type: ClusterIP
    port: 8080
  converter:
    type: ClusterIP
    port: 8090
  web:
    type: ClusterIP
    port: 3000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: wiki.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  APP_ENV: production
  APP_URL: https://wiki.example.com
  API_URL: https://wiki.example.com
  MCP_URL: https://wiki.example.com/mcp
  CONVERTER_URL: http://{{ .Release.Name }}-converter:8090
  EMBEDDING_DIMENSIONS: "1024"
  WORKER_POLL_INTERVAL_MS: "1500"

secrets:
  keyringJson: ""
  internalServiceToken: ""

postgresql:
  enabled: true
  auth:
    username: llmwiki
    password: llmwiki
    database: llmwiki
  primary:
    persistence:
      size: 10Gi

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      size: 2Gi

minio:
  enabled: true
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  defaultBuckets: llmwiki
  persistence:
    size: 10Gi

resources:
  platformApi:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  worker:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  mcp:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  converter:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  web:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
