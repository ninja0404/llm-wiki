apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app: {{ .Release.Name }}-worker
spec:
  replicas: {{ .Values.replicaCount.worker }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.worker.pullPolicy }}
          env:
            - name: APP_ENV
              value: {{ .Values.env.APP_ENV | quote }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379/0"
            - name: MINIO_ENDPOINT
              value: "{{ .Release.Name }}-minio:9000"
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.auth.rootUser | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.auth.rootPassword | quote }}
            - name: MINIO_BUCKET
              value: "llmwiki"
            - name: CONVERTER_URL
              value: "http://{{ .Release.Name }}-converter:8090"
            - name: ACTIVE_KEY_VERSION
              value: "v1"
            - name: KEYRING_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-platform-secrets
                  key: keyringJson
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-platform-secrets
                  key: internalServiceToken
            - name: EMBEDDING_DIMENSIONS
              value: {{ .Values.env.EMBEDDING_DIMENSIONS | quote }}
            - name: WORKER_POLL_INTERVAL_MS
              value: {{ .Values.env.WORKER_POLL_INTERVAL_MS | quote }}
          resources:
            {{- toYaml .Values.resources.worker | nindent 12 }}
