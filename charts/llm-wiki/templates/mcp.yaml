apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mcp
  labels:
    app: {{ .Release.Name }}-mcp
spec:
  replicas: {{ .Values.replicaCount.mcp }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-mcp
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-mcp
    spec:
      containers:
        - name: mcp
          image: "{{ .Values.image.mcp.repository }}:{{ .Values.image.mcp.tag }}"
          imagePullPolicy: {{ .Values.image.mcp.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: {{ .Values.env.APP_ENV | quote }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379/0"
            - name: MINIO_ENDPOINT
              value: "{{ .Release.Name }}-minio:9000"
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.auth.rootUser | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.auth.rootPassword | quote }}
            - name: MINIO_BUCKET
              value: "llmwiki"
            - name: ACTIVE_KEY_VERSION
              value: "v1"
            - name: KEYRING_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-platform-secrets
                  key: keyringJson
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-platform-secrets
                  key: internalServiceToken
          resources:
            {{- toYaml .Values.resources.mcp | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mcp
spec:
  type: {{ .Values.service.mcp.type }}
  ports:
    - port: {{ .Values.service.mcp.port }}
      targetPort: 8080
  selector:
    app: {{ .Release.Name }}-mcp
