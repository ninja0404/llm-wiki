name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Set up pnpm
        run: corepack enable

      - name: Write CI .env
        run: |
          python3 - <<'PY'
          import base64
          import secrets
          from pathlib import Path

          key = base64.urlsafe_b64encode(secrets.token_bytes(32)).decode().rstrip("=")
          env = f"""APP_ENV=development
          APP_URL=http://localhost:3000
          API_URL=http://localhost:8000
          MCP_URL=http://localhost:8080/mcp
          CONVERTER_URL=http://localhost:8090
          POSTGRES_USER=llmwiki
          POSTGRES_PASSWORD=llmwiki
          POSTGRES_DB=llmwiki
          POSTGRES_PORT=5432
          DATABASE_URL=postgresql://llmwiki:llmwiki@localhost:5432/llmwiki
          REDIS_URL=redis://localhost:6379/0
          REDIS_PORT=6379
          MINIO_ENDPOINT=localhost:9000
          MINIO_USE_SSL=false
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin
          MINIO_BUCKET=llmwiki
          INTERNAL_SERVICE_TOKEN=0123456789abcdef0123456789abcdef
          MINIO_PORT=9000
          MINIO_CONSOLE_PORT=9001
          ACTIVE_KEY_VERSION=ci-v1
          KEYRING_JSON={{"ci-v1":"{key}"}}
          WORKER_POLL_INTERVAL_MS=1500
          EMBEDDING_DIMENSIONS=1024
          """
          Path(".env").write_text("\n".join(line.strip() for line in env.splitlines() if line.strip()) + "\n", encoding="utf-8")
          PY

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Start infrastructure
        run: docker compose up -d postgres redis minio

      - name: Wait for infrastructure
        run: python3 scripts/check_local_stack.py

      - name: Migration smoke check
        run: python3 scripts/init_local_db.py --reset

      - name: Python lint
        run: ruff check .

      - name: Python tests
        run: pytest tests/unit tests/integration

      - name: Frontend lint
        run: pnpm --dir web run lint

      - name: Frontend build
        run: pnpm --dir web run build
